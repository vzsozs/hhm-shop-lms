services:
  db:
    image: postgres:16-alpine
    container_name: hhm-shop-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-hhm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hhm_password}
      POSTGRES_DB: ${DB_NAME:-hhm_shop_lms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: hhm-shop-web
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/public/uploads
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - NEXT_PUBLIC_APP_URL=http://185.208.227.129:3000
    depends_on:
      - db

volumes:
  postgres_data:
