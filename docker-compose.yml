services:
  db:
    image: postgres:16-alpine
    container_name: hhm-shop-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-hhm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hhm_password}
      POSTGRES_DB: ${DB_NAME:-hhm_shop_lms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hhm_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: hhm-shop-web
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./uploads:/app/public/uploads
    networks:
      - hhm_network
    environment:
      - NEXT_PUBLIC_APP_URL=https://zvukovaakademia.sk
    depends_on:
      - db

volumes:
  postgres_data:

networks:
  hhm_network:
    external: true